# Git 平台推送配置
# 1 = 启用推送, 0 = 禁用推送




platforms:
  github:
    enabled: 0
    remote: "github"
    excludeFile: ".cheezmil_quick_git/config/exclude-github"
    tokenFilePath: ""
    autoCreateRemoteRepo: 0
    remoteUrl: ""
    sshUrlTemplate: ""
  gitea:
    enabled: 1
    remote: "gitea"
    excludeFile: ".cheezmil_quick_git/config/exclude-gitea"
    tokenFilePath: "D:\\\\MyNotes\\\\pw\\\\gitea\\\\pw_gitea.ini"
    autoCreateRemoteRepo: 1
    remoteUrl: "ssh://git@127.0.0.1:3001/AlexanderDash/{current_working_directory_name}"
    sshUrlTemplate: "ssh://git@127.0.0.1:3001/AlexanderDash/{current_working_directory_name}"
  gitee:
    enabled: 0
    remote: "gitee"
    excludeFile: ".cheezmil_quick_git/config/exclude-gitee"
    tokenFilePath: ""
    autoCreateRemoteRepo: 0
    remoteUrl: ""
    sshUrlTemplate: ""
  gitcode:
    enabled: 0
    remote: "gitcode"
    excludeFile: ".cheezmil_quick_git/config/exclude-gitcode"
    tokenFilePath: "D:\\\\MyNotes\\\\pw\\\\gitcode\\\\gitcode_token.ini"
    autoCreateRemoteRepo: 0
    remoteUrl: ""
    sshUrlTemplate: ""
  atomgit:
    enabled: 0
    remote: "atomgit"
    excludeFile: ".cheezmil_quick_git/config/exclude-atomgit"
    tokenFilePath: ""
    autoCreateRemoteRepo: 0
    remoteUrl: ""
    sshUrlTemplate: ""
settings:
  pushSequentially: 1
  continueOnError: 0
  showSummary: 1
  defaultExcludeFile: ".cheezmil_quick_git/config/exclude-github"
  forceResetFiles: "[\".cheezmil_quick_git/config/exclude-github\"]"
  myOwnNames: "[\\\"AlexanderDash\\\", \\\"cheezmil\\\"]"
